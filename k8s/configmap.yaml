---
# ConfigMap for non-sensitive configuration
# Contains database, Redis, and Django settings that do NOT contain secrets
apiVersion: v1
kind: ConfigMap
metadata:
  name: status-page-config
  namespace: default
data:
  # Django settings
  DJANGO_SETTINGS_MODULE: "statuspage.settings"
  STATUS_PAGE_CONFIGURATION: "statuspage.configuration"
  
  # Database configuration (non-sensitive)
  DB_PORT: "5432"
  DB_NAME: "statuspage"
  
  # Redis configuration (non-sensitive)
  REDIS_PORT: "6379"
  REDIS_DB_TASKS: "0"
  REDIS_DB_CACHE: "1"
  REDIS_SSL: "True"

  # Static files configuration
  STATIC_ROOT: "/app/static/"

  # Site URL
  SITE_URL: " "  # Replace with your domain or ALB URL
  
  # Allowed hosts
  ALLOWED_HOSTS: "*"  # Replace with your domains
  
  # Email settings (non-sensitive parts)
  EMAIL_HOST: "smtp.example.com"
  EMAIL_PORT: "587"
  EMAIL_USE_TLS: "True"
  EMAIL_USE_SSL: "False"
  EMAIL_TIMEOUT: "10"
  EMAIL_FROM: "noreply@status.example.com"
  
  # Optional: Plugins to enable
  PLUGINS: ""  # Leave empty or set to "sp_uptimerobot,sp_external_status_providers"
  
  # Optional: Password validators
  PASSWORD_MIN_LENGTH: "8"
  
  # Timezone
  TIME_ZONE: "UTC"
  
  # Debug mode (NEVER True in production)
  DEBUG: "False"
  
  # Session timeout (14 days in seconds)
  LOGIN_TIMEOUT: "1209600"
  
  # Base path (if running under a subdirectory)
  BASE_PATH: ""
  
  # CORS settings
  CORS_ORIGIN_ALLOW_ALL: "False"
  CORS_ORIGIN_WHITELIST: " "  # Replace with your domain or ALB URL
  
  # RQ background task timeout (seconds)
  RQ_DEFAULT_TIMEOUT: "300"
