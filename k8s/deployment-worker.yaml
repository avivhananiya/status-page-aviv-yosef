---
# Deployment: RQ Worker
# Runs the RQ (Redis Queue) worker for background task processing
apiVersion: apps/v1
kind: Deployment
metadata:
  name: status-page-worker
  namespace: default
  labels:
    app: status-page
    component: worker
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  
  selector:
    matchLabels:
      app: status-page
      component: worker
  
  template:
    metadata:
      labels:
        app: status-page
        component: worker
    
    spec:
      # Use the ServiceAccount configured for AWS Secrets Store access
      serviceAccountName: status-page-sa
      
      # Security context: allow status-page user (1000) to read mounted secrets
      securityContext:
        fsGroup: 1000
      
      # Pod disruption budget for availability
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - status-page
              topologyKey: kubernetes.io/hostname
      
      containers:
      - name: rq-worker
        image: status-page-app
        imagePullPolicy: Always
        
        # RQ Worker command to process background tasks
        command:
          - "python"
          - "manage.py"
          - "rqworker"
          - "default"
          - "high"
          - "low"
        
        # Environment variables from ConfigMap
        envFrom:
        - configMapRef:
            name: status-page-config

        - secretRef:
            name: status-page-infra-secrets
        
        # Resource requests and limits
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        
        # Security context for the container
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
            - ALL
        
        # Mount the secrets from AWS Secrets Store CSI Driver
        volumeMounts:
        - name: secrets-store
          mountPath: "/mnt/secrets-store"
          readOnly: true
      
      # CSI volume for AWS Secrets Store
      volumes:
      - name: secrets-store
        csi:
          driver: secrets-store.csi.k8s.io
          readOnly: true
          volumeAttributes:
            secretProviderClass: "status-page-aws-secrets"
