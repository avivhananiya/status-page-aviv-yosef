---
# HPA: Web Deployment (50% CPU target)
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: status-page-web-hpa
  namespace: default
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: status-page-web
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 50

---
# HPA: Worker Deployment (60% CPU target)
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: status-page-worker-hpa
  namespace: default
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: status-page-worker
  minReplicas: 1
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 60
