---
# Ingress: AWS Load Balancer Controller (HTTP Only for Testing)
# Routes external HTTP traffic to the status-page-service
# Uses AWS Application Load Balancer
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: status-page-ingress
  namespace: default
  labels:
    app: status-page
  
  annotations:
    alb.ingress.kubernetes.io/success-codes: "200"
    # AWS Load Balancer Controller annotations
    alb.ingress.kubernetes.io/load-balancer-name: "status-page-alb"
    alb.ingress.kubernetes.io/scheme: "internet-facing"
    alb.ingress.kubernetes.io/target-type: "ip"
    
    # Listen only on HTTP port 80 for testing
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}]'
    
    # Health check settings
    alb.ingress.kubernetes.io/healthcheck-path: "/"
    alb.ingress.kubernetes.io/healthcheck-protocol: "HTTP"
    alb.ingress.kubernetes.io/healthy-threshold-count: "2"
    alb.ingress.kubernetes.io/unhealthy-threshold-count: "2"
    alb.ingress.kubernetes.io/healthcheck-interval-seconds: "15"
    alb.ingress.kubernetes.io/healthcheck-timeout-seconds: "5"
    
    # Load balancer attributes
    alb.ingress.kubernetes.io/load-balancer-attributes: |
      idle_timeout.timeout_seconds=60,
      deletion_protection.enabled=false
    
    # Tags for the ALB
    alb.ingress.kubernetes.io/tags: "Environment=prod,Application=status-page"

spec:
  ingressClassName: "alb"
  
  rules:
  - http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: status-page-service
            port:
              number: 8000