---
# Job: Database Migration
# Runs once to apply Django database migrations
# Must complete before Web/Worker/Scheduler deployments start
apiVersion: batch/v1
kind: Job
metadata:
  name: status-page-migration
  namespace: default
  labels:
    app: status-page
    component: migration
spec:
  # Automatically delete the job pod after 1 week if completed
  ttlSecondsAfterFinished: 604800
  # Allow 1 retry on transient failure (e.g., DB not yet available after Scale-to-Zero startup)
  backoffLimit: 1
  template:
    metadata:
      labels:
        app: status-page
        component: migration
    spec:
      # Use the ServiceAccount configured for AWS Secrets Store access
      serviceAccountName: status-page-sa
      restartPolicy: Never
      
      # Security context: allow status-page user (1000) to read mounted secrets
      securityContext:
        fsGroup: 1000
      
      containers:
      - name: django-migrate
        image: status-page-app
        imagePullPolicy: IfNotPresent
        
        # Override the default gunicorn command to run migrations
        command:
          - "python"
          - "manage.py"
          - "migrate"
        
        # Environment variables from ConfigMap
        envFrom:
        - configMapRef:
            name: status-page-config

        - secretRef:
            name: status-page-infra-secrets
        
        # Security context for the container
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
        
        # Mount the secrets from AWS Secrets Store CSI Driver
        volumeMounts:
        - name: secrets-store
          mountPath: "/mnt/secrets-store"
          readOnly: true
      
      # CSI volume for AWS Secrets Store
      volumes:
      - name: secrets-store
        csi:
          driver: secrets-store.csi.k8s.io
          readOnly: true
          volumeAttributes:
            secretProviderClass: "status-page-aws-secrets"
