---
# Deployment: RQ Worker
# Runs RQ workers with built-in leader-elected scheduling (--with-scheduler)
# Replaces the singleton Scheduler deployment — any worker can assume the scheduler role
apiVersion: apps/v1
kind: Deployment
metadata:
  name: status-page-worker
  namespace: {{ .Values.namespace }}
  labels:
    app: status-page
    component: worker
spec:
  replicas: {{ .Values.worker.replicaCount }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  
  selector:
    matchLabels:
      app: status-page
      component: worker
  
  template:
    metadata:
      labels:
        app: status-page
        component: worker
    
    spec:
      # Use the ServiceAccount configured for AWS Secrets Store access
      serviceAccountName: status-page-sa
      
      # Security context: allow status-page user (1000) to read mounted secrets
      securityContext:
        fsGroup: 1000
      
      # Pod disruption budget for availability
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - status-page
              topologyKey: kubernetes.io/hostname
      
      # Allow 120s for graceful shutdown (Spot instances give 2-min eviction warning)
      terminationGracePeriodSeconds: 120

      containers:
      - name: rq-worker
        image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        
        # RQ Worker with built-in scheduler (leader election among workers)
        command:
          - "python"
          - "manage.py"
          - "rqworker"
          - "--with-scheduler"
          - "default"
          - "high"
          - "low"
        
        # Environment variables from ConfigMap
        envFrom:
        - configMapRef:
            name: status-page-config

        - secretRef:
            name: status-page-infra-secrets
        
        # Resource requests and limits
        resources:
          {{- toYaml .Values.resources | nindent 10 }}
        
        # Security context for the container
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
            - ALL
        
        # Mount the secrets from AWS Secrets Store CSI Driver
        volumeMounts:
        - name: secrets-store
          mountPath: "/mnt/secrets-store"
          readOnly: true
      
      # CSI volume for AWS Secrets Store
      volumes:
      - name: secrets-store
        csi:
          driver: secrets-store.csi.k8s.io
          readOnly: true
          volumeAttributes:
            secretProviderClass: "status-page-aws-secrets"
