---
# HPA: Web Deployment (50% CPU target)
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: status-page-web-hpa
  namespace: {{ .Values.namespace }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: status-page-web
  minReplicas: {{ .Values.web.minReplicas }}
  maxReplicas: {{ .Values.web.maxReplicas }}
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 50

---
# HPA: Worker Deployment (60% CPU target)
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: status-page-worker-hpa
  namespace: {{ .Values.namespace }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: status-page-worker
  minReplicas: {{ .Values.worker.minReplicas }}
  maxReplicas: {{ .Values.worker.maxReplicas }}
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 60
