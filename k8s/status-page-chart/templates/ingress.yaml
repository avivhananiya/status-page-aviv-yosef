---
# Ingress: AWS Load Balancer Controller
# Routes external traffic to the status-page-service via ALB
# HTTPS with HTTP-to-HTTPS redirect, WAF protection, ExternalDNS
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: status-page-ingress
  namespace: {{ .Values.namespace }}
  labels:
    app: status-page
  
  annotations:
    alb.ingress.kubernetes.io/success-codes: "200"
    # AWS Load Balancer Controller annotations
    alb.ingress.kubernetes.io/load-balancer-name: "status-page-alb"
    alb.ingress.kubernetes.io/scheme: "internet-facing"
    alb.ingress.kubernetes.io/target-type: "ip"

    # AWS WAF — replace with actual ARN from: terraform output waf_web_acl_arn
    alb.ingress.kubernetes.io/wafv2-acl-arn: "{{ .Values.ingress.wafAclArn }}"
    
    # HTTPS + HTTP-to-HTTPS redirect
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS":443}]'
    alb.ingress.kubernetes.io/ssl-redirect: '443'
    # ACM certificate — replace with actual ARN from: terraform output acm_certificate_arn
    alb.ingress.kubernetes.io/certificate-arn: "{{ .Values.ingress.certificateArn }}"
    
    # Health check settings
    alb.ingress.kubernetes.io/healthcheck-path: "/"
    alb.ingress.kubernetes.io/healthcheck-protocol: "HTTP"
    alb.ingress.kubernetes.io/healthy-threshold-count: "2"
    alb.ingress.kubernetes.io/unhealthy-threshold-count: "2"
    alb.ingress.kubernetes.io/healthcheck-interval-seconds: "15"
    alb.ingress.kubernetes.io/healthcheck-timeout-seconds: "5"
    alb.ingress.kubernetes.io/healthcheck-host: "{{ .Values.ingress.host }}"
    
    # Load balancer attributes
    alb.ingress.kubernetes.io/load-balancer-attributes: |
      idle_timeout.timeout_seconds=60,
      deletion_protection.enabled=false
    
    # Tags for the ALB
    alb.ingress.kubernetes.io/tags: "Environment=prod,Application=status-page"

spec:
  ingressClassName: "alb"
  
  rules:
  - host: {{ .Values.ingress.host }}
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: status-page-service
            port:
              number: 8000