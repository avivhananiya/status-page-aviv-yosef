apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: status-page-aws-secrets
  namespace: {{ .Values.namespace }}
spec:
  provider: aws
  parameters:
    objects: |
      - objectName: "{{ .Values.aws.secretsManagerNamePrefix }}-db-credentials-v2"
        objectType: "secretsmanager"
        jmesPath:
          - path: "password"
            objectAlias: "DB_PASSWORD"
          - path: "username"
            objectAlias: "DB_USER"
            
      - objectName: "{{ .Values.aws.secretsManagerNamePrefix }}-redis-auth-v2"
        objectType: "secretsmanager"
        jmesPath:
          - path: "auth_token"
            objectAlias: "REDIS_PASSWORD"

      - objectName: "{{ .Values.aws.secretsManagerNamePrefix }}-django-secret-key"
        objectType: "secretsmanager"
        jmesPath:
          - path: "secret_key"
            objectAlias: "DJANGO_SECRET_KEY"