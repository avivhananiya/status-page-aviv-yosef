---
# Deployment: Scheduler
# Runs the RQ Scheduler to enqueue recurring tasks
# Only 1 replica needed (scheduler is not meant to be scaled)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: status-page-scheduler
  namespace: default
  labels:
    app: status-page
    component: scheduler
spec:
  replicas: 1
  strategy:
    type: Recreate  # Avoid multiple schedulers running simultaneously
  
  selector:
    matchLabels:
      app: status-page
      component: scheduler
  
  template:
    metadata:
      labels:
        app: status-page
        component: scheduler
    
    spec:
      # Use the ServiceAccount configured for AWS Secrets Store access
      serviceAccountName: status-page-sa
      
      # Security context: allow status-page user (1000) to read mounted secrets
      securityContext:
        fsGroup: 1000
      
      containers:
      - name: rq-scheduler
        image: status-page-app  # Replace with your image URI
        imagePullPolicy: Always
        
        # RQ Scheduler command to enqueue scheduled tasks
        command:
          - "python"
          - "manage.py"
          - "rqscheduler"
          - "--interval=60"
        
        # Environment variables from ConfigMap
        envFrom:
        - configMapRef:
            name: status-page-config

        - secretRef:
            name: status-page-infra-secrets
        
        # Resource requests and limits
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        
        # Security context for the container
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
            - ALL
        
        # Mount the secrets from AWS Secrets Store CSI Driver
        volumeMounts:
        - name: secrets-store
          mountPath: "/mnt/secrets-store"
          readOnly: true
      
      # CSI volume for AWS Secrets Store
      volumes:
      - name: secrets-store
        csi:
          driver: secrets-store.csi.k8s.io
          readOnly: true
          volumeAttributes:
            secretProviderClass: "status-page-aws-secrets"
