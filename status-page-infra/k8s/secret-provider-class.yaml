apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: status-page-aws-secrets
  namespace: default
spec:
  provider: aws
  parameters:
    objects: |
      - objectName: "yosef-aviv-status-page-prod-db-credentials-v2"
        objectType: "secretsmanager"
        jmesPath:
          - path: "password"
            objectAlias: "DB_PASSWORD"
          - path: "username"
            objectAlias: "DB_USER"
            
      - objectName: "yosef-aviv-status-page-prod-redis-auth-v2"
        objectType: "secretsmanager"
        jmesPath:
          - path: "auth_token"
            objectAlias: "REDIS_PASSWORD"

      - objectName: "yosef-aviv-status-page-prod-django-secret-key"
        objectType: "secretsmanager"
        jmesPath:
          - path: "secret_key"
            objectAlias: "DJANGO_SECRET_KEY"